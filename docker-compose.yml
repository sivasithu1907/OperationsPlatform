version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=/api

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - API_KEY=${API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=fieldops
      - DB_USER=fieldops
      - DB_PASSWORD=fieldops_pass
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=fieldops
      - POSTGRES_USER=fieldops
      - POSTGRES_PASSWORD=fieldops_pass
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
